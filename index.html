<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Views Generator</title>
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>

        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-10">
                    <header class="text-center mb-4">
                        <h2 class="fw-bold text-dark">Views Generator</h2>
                        <p class="text-muted">Enter video URLs below to generate simultaneous views.</p>
                    </header>
                    
                    <!-- Input -->
                    <section id="input-section" class="card shadow-sm p-4">
                        <div class="mb-4">
                            <label for="importLinks" class="form-label fw-bold">Import Links - JSON</label>
                            <div class="input-group">
                                <input type="file" class="form-control" id="importLinks" accept=".json">
                                <button class="btn btn-outline-secondary" type="button" id="importBtn">Import</button>
                            </div>
                            <div id="importFeedback" class="form-text mt-2">Upload ".json" file containing array of URLs.</div>
                        </div>

                        <hr>

                        <form id="viewsForm">
                            <div id="url-container">
                                <div class="input-group mb-3 url-input-group" id="group_0">
                                    <input type="url" 
                                           class="form-control url-input" 
                                           id="input_field_0" 
                                           placeholder="https://www.youtube.com/watch?v=..."
                                           required>
                                    <button class="btn btn-primary" type="button" onclick="addField()">
                                        <strong>+</strong>
                                    </button>
                                </div>
                            </div>
                            
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-success btn-lg">Generate</button>
                            </div>
                        </form>
                    </section>

                    <hr class="my-5">

                    <!-- Output -->
                    <section id="output-section">
                        <div id="video-display-area" class="d-flex flex-wrap justify-content-center gap-2 align-items-center">
                            <h4 class="text-secondary opacity-50 py-5" id="placeholder-text">Waiting for input url...</h4>
                        </div>
                    </section>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
