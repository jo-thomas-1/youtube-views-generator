<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Views Generator</title>
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>

        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-10">
                    <header class="text-center mb-4">
                        <h2 class="fw-bold text-dark">Views Generator</h2>
                        <p class="text-muted">Enter video URLs below to generate simultaneous views.</p>
                    </header>
                    
                    <!-- Input -->
                    <section id="input-section" class="card shadow-sm p-4">
                        <form id="viewsForm" novalidate>
                            <div id="url-container">
                                <div class="input-group mb-3 url-input-group" id="group_0">
                                    <input type="url" class="form-control url-input" id="input_field_0" 
                                           placeholder="https://www.youtube.com/watch?v=..." required>
                                    <div class="invalid-feedback">Please enter a valid YouTube URL.</div>
                                    <button class="btn btn-primary" type="button" onclick="addField()"><strong>+</strong></button>
                                </div>
                            </div>
                            
                            <div class="row g-2 mt-4">
                                <div class="col-md-8 d-grid">
                                    <button type="submit" class="btn btn-success btn-lg">Generate</button>
                                </div>
                                <div class="col-md-4 d-grid">
                                    <button type="button" class="btn btn-outline-danger btn-lg" id="clearAllBtn">Clear All</button>
                                </div>
                            </div>
                        </form>
                    </section>

                    <button type="button" class="btn btn-primary btn-lg rounded-circle shadow" id="backToTop" style="display: none;">
                        ↑
                    </button>

                    <hr class="my-5">

                    <!-- Output -->
                    <section id="output-section">
                        <div id="video-display-area" class="d-flex flex-wrap justify-content-center gap-2 align-items-center">
                            <h4 class="text-secondary opacity-50 py-5" id="placeholder-text">Waiting for input url...</h4>
                        </div>
                    </section>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
